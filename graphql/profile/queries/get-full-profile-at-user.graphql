query GetFullProfileAtUser {
	getMe {
		id
		email
		isVerified
		isTwoFactorEnabled
		profile {
			fullName
			age
			bio
			gender
			sites
			imageUrl
		}
		measurements {
			weightKg
			goalWeightKg

			armCm
			chestCm
			heightCm
			thighCm
			waistCm

			nutritionalGoal
			activityLevel
		}
	}
}
